<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 262" role="img" aria-label="Leakless Plumbing logo mark">
  <defs>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8fd0f2"/>
      <stop offset="0.5" stop-color="#2f9fe6"/>
      <stop offset="1" stop-color="#1c73bd"/>
    </linearGradient>
    <linearGradient id="tear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#37a9ea"/>
      <stop offset="1" stop-color="#1457bf"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4bb4ee"/>
      <stop offset="1" stop-color="#1560bf"/>
    </linearGradient>
  </defs>

  <!-- Teardrop outline -->
  <path d="M120 18 C 78 92, 44 132, 44 176 a 76 76 0 1 0 152 0 C 196 132, 162 92, 120 18 Z"
        fill="none" stroke="url(#tear)" stroke-width="12" stroke-linejoin="round"/>

  <!-- L-shaped pipe -->
  <!-- vertical section -->
  <rect x="96" y="70" width="40" height="118" rx="8" fill="url(#pipe)"/>
  <!-- horizontal section -->
  <rect x="112" y="150" width="104" height="40" rx="8" fill="url(#pipe)"/>
  <!-- top flange -->
  <rect x="83" y="56" width="66" height="22" rx="11" fill="url(#pipe)"/>
  <rect x="83" y="70" width="66" height="5" fill="#0a2540" opacity="0.18"/>
  <!-- right flange -->
  <rect x="202" y="137" width="22" height="66" rx="11" fill="url(#pipe)"/>
  <rect x="209" y="137" width="5" height="66" fill="#0a2540" opacity="0.18"/>
  <!-- highlights -->
  <rect x="104" y="80" width="9" height="100" rx="4.5" fill="#ffffff" opacity="0.42"/>
  <rect x="122" y="158" width="86" height="9" rx="4.5" fill="#ffffff" opacity="0.42"/>

  <!-- water droplet at the outlet -->
  <path d="M236 194 c -11 15, -17 23, -17 31 a 17 17 0 0 0 34 0 c 0 -8 -6 -16 -17 -31 z" fill="url(#drop)"/>
  <ellipse cx="230" cy="222" rx="4" ry="6" fill="#ffffff" opacity="0.5"/>
</svg>
