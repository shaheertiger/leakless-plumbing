<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 560" role="img" aria-label="Leakless Plumbing logo">
  <defs>
    <linearGradient id="pipeF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8fd0f2"/>
      <stop offset="0.5" stop-color="#2f9fe6"/>
      <stop offset="1" stop-color="#1c73bd"/>
    </linearGradient>
    <linearGradient id="tearF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#37a9ea"/>
      <stop offset="1" stop-color="#1457bf"/>
    </linearGradient>
    <linearGradient id="dropF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4bb4ee"/>
      <stop offset="1" stop-color="#1560bf"/>
    </linearGradient>
    <linearGradient id="wordF" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a2540"/>
      <stop offset="0.5" stop-color="#0a2540"/>
      <stop offset="0.5" stop-color="#1789d6"/>
      <stop offset="1" stop-color="#1789d6"/>
    </linearGradient>
  </defs>

  <!-- ===== Mark ===== -->
  <g transform="translate(185,10)">
    <path d="M120 18 C 78 92, 44 132, 44 176 a 76 76 0 1 0 152 0 C 196 132, 162 92, 120 18 Z"
          fill="none" stroke="url(#tearF)" stroke-width="12" stroke-linejoin="round"/>
    <rect x="96" y="70" width="40" height="118" rx="8" fill="url(#pipeF)"/>
    <rect x="112" y="150" width="104" height="40" rx="8" fill="url(#pipeF)"/>
    <rect x="83" y="56" width="66" height="22" rx="11" fill="url(#pipeF)"/>
    <rect x="83" y="70" width="66" height="5" fill="#0a2540" opacity="0.18"/>
    <rect x="202" y="137" width="22" height="66" rx="11" fill="url(#pipeF)"/>
    <rect x="209" y="137" width="5" height="66" fill="#0a2540" opacity="0.18"/>
    <rect x="104" y="80" width="9" height="100" rx="4.5" fill="#ffffff" opacity="0.42"/>
    <rect x="122" y="158" width="86" height="9" rx="4.5" fill="#ffffff" opacity="0.42"/>
    <path d="M236 194 c -11 15, -17 23, -17 31 a 17 17 0 0 0 34 0 c 0 -8 -6 -16 -17 -31 z" fill="url(#dropF)"/>
    <ellipse cx="230" cy="222" rx="4" ry="6" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <text x="310" y="470" text-anchor="middle"
        font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="900" font-size="118"
        font-style="italic" letter-spacing="-2" fill="url(#wordF)">LEAKLESS</text>

  <!-- PLUMBING with short flanking rules kept clear of the text -->
  <line x1="45" y1="520" x2="112" y2="520" stroke="#1789d6" stroke-width="4" stroke-linecap="round"/>
  <line x1="508" y1="520" x2="575" y2="520" stroke="#1789d6" stroke-width="4" stroke-linecap="round"/>
  <text x="310" y="536" text-anchor="middle"
        font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="48"
        letter-spacing="12" fill="#0a2540">PLUMBING</text>
</svg>
